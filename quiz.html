<!DOCTYPE html>
<html lang="hu">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
</head>

   

<body class="quiz">

<section id="quiz">
    <div class="quiz-card">
        <h4 id="question" class="quiz-question">Kérdés betöltése...</h4>
        <div id="answer-buttons"></div>
        <button id="nextBtn" class="quiz-next-btn">Következő</button>
        <div id="score" class="quiz-score"></div>
    </div>
</section>

<script>
const quiz = [
    { question: "Melyik eszközzel lehet szellemdobozt használni?", answers: [
        { text: "Bekapcsolt lámpákkal", correct: false },
        { text: "Sötétben, a helyszínen", correct: true },
        { text: "Csak a teherautóban", correct: false },
        { text: "Külső térben", correct: false }
    ]},
    { question: "Melyik bizonyíték NEM létezik a Phasmophobiában?", answers: [
        { text: "EMF Level 5", correct: false },
        { text: "Spirit Box", correct: false },
        { text: "Freezing Temperatures", correct: false },
        { text: "Ghost Orbs Level 6", correct: true }
    ]},
    { question: "Mikor jelenik meg a DOTS Projector bizonyíték?", answers: [
        { text: "Ha a szellem áthalad rajta", correct: true },
        { text: "Ha vadászat indul", correct: false },
        { text: "Ha a játékos meghal", correct: false },
        { text: "Ha sötét van a teherautóban", correct: false }
    ]},
    { question: "Melyik szellem gyorsabb a sötétben?", answers: [
        { text: "Revenant", correct: false },
        { text: "Raiju", correct: true },
        { text: "Spirit", correct: false },
        { text: "Shade", correct: false }
    ]},
    { question: "Melyik szellem NEM vadászik magas sanityn?", answers: [
        { text: "Demon", correct: false },
        { text: "Shade", correct: true },
        { text: "Oni", correct: false },
        { text: "Yokai", correct: false }
    ]},
    { question: "Mi állítja meg ideiglenesen a szellemet vadászat közben?", answers: [
        { text: "Smudge Stick", correct: true },
        { text: "Crucifix", correct: false },
        { text: "Salt", correct: false },
        { text: "Candle", correct: false }
    ]},
    { question: "Melyik szellem reagál erősebben az elektronikus eszközökre?", answers: [
        { text: "Yokai", correct: true },
        { text: "Spirit", correct: false },
        { text: "Goryo", correct: false },
        { text: "Mare", correct: false }
    ]},
    { question: "Melyik tárgy akadályozza meg a vadászat elindulását?", answers: [
        { text: "Smudge Stick", correct: false },
        { text: "Crucifix", correct: true },
        { text: "Flashlight", correct: false },
        { text: "Salt", correct: false }
    ]},
    { question: "Melyik szellem NEM hagy lábnyomot UV fényben?", answers: [
        { text: "Wraith", correct: true },
        { text: "Phantom", correct: false },
        { text: "Banshee", correct: false },
        { text: "Poltergeist", correct: false }
    ]},
    { question: "Melyik szellem tud teleportálni a játékoshoz?", answers: [
        { text: "Banshee", correct: true },
        { text: "Shade", correct: false },
        { text: "Goryo", correct: false },
        { text: "Spirit", correct: false }
    ]},
    { question: "Melyik bizonyíték látható kizárólag kamerán?", answers: [
        { text: "DOTS Projector", correct: false },
        { text: "Ghost Orbs", correct: true },
        { text: "Freezing Temps", correct: false },
        { text: "EMF 5", correct: false }
    ]},
    { question: "Melyik szellem erős több játékos közelében?", answers: [
        { text: "Oni", correct: true },
        { text: "Shade", correct: false },
        { text: "Spirit", correct: false },
        { text: "Yurei", correct: false }
    ]},
    { question: "Mikor nem működik a Spirit Box?", answers: [
        { text: "Ha világos van a szobában", correct: true },
        { text: "Ha alacsony a sanity", correct: false },
        { text: "Ha DOTS aktív", correct: false },
        { text: "Ha EMF 5 van", correct: false }
    ]},
    { question: "Melyik szellem gyorsabb vadászat közben hidegben?", answers: [
        { text: "Hantu", correct: true },
        { text: "Demon", correct: false },
        { text: "Revenant", correct: false },
        { text: "Mare", correct: false }
    ]},
    { question: "Melyik szellem képes több tárgyat egyszerre eldobni?", answers: [
        { text: "Poltergeist", correct: true },
        { text: "Shade", correct: false },
        { text: "Goryo", correct: false },
        { text: "Spirit", correct: false }
    ]}
];

const questionEl = document.getElementById('question');
const answerButtonsEl = document.getElementById('answer-buttons');
const nextBtn = document.getElementById('nextBtn');
const scoreEl = document.getElementById('score');

let currentQuestion = 0;
let score = 0;

function startQuiz() {
    currentQuestion = 0;
    score = 0;
    nextBtn.innerText = "Következő";
    scoreEl.innerText = "";
    nextBtn.style.display = "none";
    showQuestion();
}

function showQuestion() {
    resetState();
    const question = quiz[currentQuestion];
    questionEl.innerText = question.question;

    question.answers.forEach(answer => {
        const button = document.createElement('button');
        button.innerText = answer.text;
        button.classList.add('quiz-answer-btn');

        if (answer.correct) {
            button.dataset.correct = "true";
        }

        button.addEventListener('click', selectAnswer);
        answerButtonsEl.appendChild(button);
    });
}

function resetState() {
    nextBtn.style.display = "none";
    answerButtonsEl.innerHTML = "";
}

function selectAnswer(e) {
    const selectedBtn = e.target;
    const correct = selectedBtn.dataset.correct === "true";

    if (correct) {
        selectedBtn.classList.add("quiz-correct");
        score++;
    } else {
        selectedBtn.classList.add("quiz-wrong");
    }

    Array.from(answerButtonsEl.children).forEach(button => {
        if (button.dataset.correct === "true") {
            button.classList.add("quiz-correct");
        }
        button.disabled = true;
    });

    nextBtn.style.display = "block";
}

nextBtn.addEventListener("click", () => {
    if (currentQuestion < quiz.length - 1) {
        currentQuestion++;
        showQuestion();
    } else {
        showScore();
    }
});

function showScore() {
    resetState();
    questionEl.innerText = "A quiz véget ért!";
    scoreEl.innerText = `Pontszám: ${score} / ${quiz.length}`;
    nextBtn.innerText = "Újra";
    nextBtn.style.display = "block";
    nextBtn.onclick = startQuiz;
}

startQuiz();
</script>


</body>
</html>
